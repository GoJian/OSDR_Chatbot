<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OSDR Study Browser</title>
<style>
  :root {
    --bg: #0f1116; --panel: #171a21; --panel-2: #1e222b; --border: #2a2f3a;
    --text: #e6e8ee; --muted: #8a91a0; --accent: #4f8cff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--text); }
  .app { display: flex; height: 100vh; }

  /* List pane */
  .list-pane { width: 380px; flex-shrink: 0; background: var(--panel);
               border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .list-head { padding: 14px; border-bottom: 1px solid var(--border); }
  .list-head h1 { margin: 0 0 2px; font-size: 16px; }
  .list-head .sub { color: var(--muted); font-size: 12px; }
  .search { display: flex; gap: 6px; margin-top: 12px; }
  .search input { flex: 1; background: var(--panel-2); border: 1px solid var(--border);
                  border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: 14px; }
  .search button { background: var(--accent); color: #fff; border: none; border-radius: 8px;
                   padding: 8px 12px; font-weight: 600; cursor: pointer; }
  .search button:disabled { opacity: .5; cursor: default; }
  .mode { padding: 6px 14px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border);
          display: flex; justify-content: space-between; align-items: center; }
  .mode a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .studies { flex: 1; overflow-y: auto; }
  .study-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .study-item:hover { background: var(--panel-2); }
  .study-item.active { background: var(--panel-2); border-left: 3px solid var(--accent); padding-left: 11px; }
  .study-item .id { color: var(--accent); font-size: 12px; font-weight: 600; }
  .study-item .t { font-size: 13px; margin-top: 2px; line-height: 1.35; }
  .study-item .meta { color: var(--muted); font-size: 11px; margin-top: 3px; }

  /* Detail pane */
  .detail { flex: 1; overflow-y: auto; padding: 28px 34px; }
  .detail .empty { color: var(--muted); margin-top: 40px; text-align: center; }
  .detail h2 { margin: 0 0 4px; font-size: 20px; line-height: 1.3; }
  .detail .did { color: var(--accent); font-weight: 600; font-size: 13px; }
  .detail .desc { line-height: 1.55; margin: 16px 0; color: #cdd2dc; }
  .grid { display: grid; grid-template-columns: 150px 1fr; gap: 8px 16px; margin: 18px 0;
          font-size: 14px; }
  .grid dt { color: var(--muted); }
  .grid dd { margin: 0; }
  .openbtn { display: inline-block; margin-top: 8px; background: var(--panel-2);
             border: 1px solid var(--border); color: var(--text); border-radius: 8px;
             padding: 8px 14px; text-decoration: none; font-size: 13px; }
  .openbtn:hover { border-color: var(--accent); }
  .muted { color: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <div class="list-pane">
    <div class="list-head">
      <h1>OSDR Study Browser</h1>
      <div class="sub">NASA Open Science Data Repository</div>
      <div class="search">
        <input id="q" placeholder="Semantic search across studies…" autocomplete="off" />
        <button id="go">Search</button>
      </div>
    </div>
    <div class="mode">
      <span id="mode-label">All studies</span>
      <a id="clear" style="display:none">Clear</a>
    </div>
    <div class="studies" id="studies"></div>
  </div>
  <div class="detail" id="detail">
    <div class="empty">Select a study to view its full record.</div>
  </div>
</div>

<script>
// Relative to page URL so it works behind OOD's /node/datahive/8078/ proxy.
const API = new URL("api/", document.baseURI).href;
const OSDR = "https://osdr.nasa.gov/bio/repo/data/studies/";
const $ = (id) => document.getElementById(id);
let all = [], activeId = null;

async function loadAll() {
  const r = await fetch(API + "studies");
  const d = await r.json();
  all = d.studies || [];
  $("mode-label").textContent = `All studies · ${d.count ?? all.length}`;
  $("clear").style.display = "none";
  renderList(all);
}

function renderList(items, scored) {
  const el = $("studies");
  el.innerHTML = "";
  if (!items.length) { el.innerHTML = '<div class="study-item muted">No studies.</div>'; return; }
  for (const s of items) {
    const div = document.createElement("div");
    div.className = "study-item" + (s.study_id === activeId ? " active" : "");
    const meta = scored
      ? `match ${(s.score * 100).toFixed(0)}%`
      : `${s.file_count} file${s.file_count === 1 ? "" : "s"}`;
    div.innerHTML = `<div class="id">${s.study_id}</div>
      <div class="t">${escapeHtml(s.title || "(untitled)")}</div>
      <div class="meta">${meta}</div>`;
    div.onclick = () => openStudy(s.study_id, div);
    el.appendChild(div);
  }
}

async function search() {
  const q = $("q").value.trim();
  if (!q) return loadAll();
  $("go").disabled = true; $("go").textContent = "…";
  try {
    const r = await fetch(API + "search?q=" + encodeURIComponent(q));
    const d = await r.json();
    $("mode-label").textContent = `Results for “${q}” · ${d.results.length}`;
    $("clear").style.display = "inline";
    renderList(d.results, true);
  } finally {
    $("go").disabled = false; $("go").textContent = "Search";
  }
}

async function openStudy(id, node) {
  activeId = id;
  document.querySelectorAll(".study-item").forEach((n) => n.classList.remove("active"));
  node?.classList.add("active");
  const detail = $("detail");
  detail.innerHTML = '<div class="empty">Loading…</div>';
  const r = await fetch(API + "study/" + encodeURIComponent(id));
  if (!r.ok) { detail.innerHTML = '<div class="empty">Not found.</div>'; return; }
  const s = await r.json();
  detail.innerHTML = renderDetail(s);
}

function renderDetail(s) {
  const rows = [
    ["Organism", s.organism],
    ["Material", s.material_type],
    ["Assay", join([s.assay_measurement, s.assay_technology, s.assay_platform])],
    ["Study factor", s.study_factor],
    ["Project type", s.project_type],
    ["Flight program", s.flight_program],
    ["Mission", missionName(s.mission)],
    ["Managing center", s.managing_center],
    ["Released", fmtDate(s.release_date)],
    ["Files", s.file_count != null ? String(s.file_count) : null],
  ].filter(([, v]) => v);
  const dl = rows.map(([k, v]) => `<dt>${k}</dt><dd>${escapeHtml(v)}</dd>`).join("");
  const pub = s.publication_title
    ? `<div class="grid"><dt>Publication</dt><dd>${escapeHtml(s.publication_title)}${
        s.publication_authors ? `<div class="muted" style="margin-top:4px">${escapeHtml(s.publication_authors)}</div>` : ""
      }</dd></div>` : "";
  return `<div class="did">${s.study_id}</div>
    <h2>${escapeHtml(s.title || "(untitled)")}</h2>
    ${s.description ? `<div class="desc">${escapeHtml(s.description)}</div>` : ""}
    <dl class="grid">${dl}</dl>
    ${pub}
    <a class="openbtn" href="${OSDR}${encodeURIComponent(s.study_id)}" target="_blank" rel="noopener">Open in OSDR ↗</a>`;
}

function missionName(m) { return m && typeof m === "object" ? (m.name || m.mission || null) : (m || null); }
function join(a) { return a.filter(Boolean).join(" · ") || null; }
function fmtDate(v) {
  if (!v) return null;
  const n = Number(v);
  if (!isFinite(n)) return String(v);
  return new Date(n * 1000).toISOString().slice(0, 10);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

$("go").onclick = search;
$("q").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });
$("clear").onclick = () => { $("q").value = ""; loadAll(); };
loadAll();
</script>
</body>
</html>
